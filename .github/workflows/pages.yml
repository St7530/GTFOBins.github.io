name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write  # 创建 Release 和上传附件所需的权限

jobs:
  Build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Package site
        run: |
          cd _site
          zip -r ../site.zip .
          cd ..

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Build ${{ github.run_number }}"
          body: |
            Automated release from master branch commit `${{ github.sha }}`
          files: site.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
